<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="OMARE - Sistema de Proformas y Gestión de Pedidos. Crea, gestiona y genera proformas de pedidos de forma rápida y sencilla.">
  <title>OMARE - Proformas y Pedidos</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- jsPDF + AutoTable via CDN (usando unpkg por mayor fiabilidad) -->
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/jspdf-autotable@3.8.3/dist/jspdf.plugin.autotable.min.js"></script>

  <!-- SheetJS (XLSX) para exportar a Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/tokens.css">
  <link rel="stylesheet" href="src/styles/reset.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/login.css">
  <link rel="stylesheet" href="src/styles/pedido.css">
  <link rel="stylesheet" href="src/styles/estadisticas.css">
  <link rel="stylesheet" href="src/styles/campanyas.css">
  <link rel="stylesheet" href="src/styles/responsive.css">

  <!-- Favicon inline (crimson O) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23E4003A'>O</text></svg>">
</head>

<body>
  <!-- App Mount Point -->
  <div id="app">
    <!-- Loading State -->
    <div class="login-page" style="flex-direction:column;gap:1rem;">
      <div class="spinner"></div>
      <p style="color:white;font-size:0.875rem;">Cargando OMARE...</p>
    </div>
  </div>

  <!-- Scripts (order matters: services first, then utils, then app) -->
  <script src="src/utils/formatters.js?v=1.1.0"></script>
  <script src="src/utils/supabaseClient.js?v=1.1.0"></script>
  <script src="src/utils/toast.js?v=1.1.0"></script>
  <script src="src/utils/excelExporter.js?v=1.1.0"></script>
  <script src="src/services/csvService.js?v=1.1.0"></script>
  <script src="src/services/authService.js?v=1.1.0"></script>
  <script src="src/services/clienteService.js?v=1.1.0"></script>
  <script src="src/services/pedidoService.js?v=1.1.0"></script>
  <script src="src/utils/pdfGenerator.js?v=1.1.0"></script>
  <script src="src/app.js?v=1.1.0"></script>
</body>

</html>
